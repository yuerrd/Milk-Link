# Mosquitto MQTT broker configuration for Milk-Link
listener 1883
# WARNING: allow_anonymous is enabled for convenience in home/LAN deployments.
# For production or internet-exposed brokers, disable anonymous access and
# configure username/password authentication:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd
# Then set MQTT_USERNAME / MQTT_PASSWORD in the server .env and firmware config.h.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
