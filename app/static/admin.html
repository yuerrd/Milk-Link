<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milk-Link 管理后台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- NOTE: add integrity="sha384-…" crossorigin="anonymous" attributes for production deployments -->
  <style>
    body { background: #f4f6f9; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .stat-card .stat-icon { font-size: 2.2rem; opacity: .85; }
    .stat-card .stat-val  { font-size: 2rem; font-weight: 700; line-height: 1.1; }
    .stat-card .stat-lbl  { font-size: .78rem; color: #6c757d; margin-top: 2px; }
    .badge-online  { background: #198754; }
    .badge-offline { background: #6c757d; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .card-header { background: transparent; border-bottom: 1px solid rgba(0,0,0,.06);
                   font-weight: 600; padding: .8rem 1.2rem; }
    .table th { font-size: .82rem; text-transform: uppercase; letter-spacing: .04em;
                color: #6c757d; border-top: none; }
    .table td { font-size: .9rem; vertical-align: middle; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot-on  { background: #198754; box-shadow: 0 0 5px #19875480; }
    .dot-off { background: #adb5bd; }
    #spinner { display: none; }
    .type-milk  { color: #0d6efd; }
    .type-solid { color: #fd7e14; }
    @media (max-width: 576px) {
      .stat-card .stat-val { font-size: 1.5rem; }
      .stat-card .stat-icon { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-dark" style="background:#1a56db;">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-droplet-half me-2"></i>Milk-Link 管理后台</span>
    <div class="d-flex align-items-center gap-2">
      <span id="spinner" class="spinner-border spinner-border-sm text-white" role="status"></span>
      <small id="last-updated" class="text-white opacity-75"></small>
      <button class="btn btn-sm btn-outline-light" onclick="loadAll()">
        <i class="bi bi-arrow-clockwise"></i> 刷新
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid py-3 px-3 px-lg-4">

  <!-- ── Error banner ── -->
  <div id="error-banner" class="alert alert-danger d-none" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <span id="error-text"></span>
  </div>

  <!-- ── Summary cards ── -->
  <div class="row g-3 mb-3">
    <div class="col-6 col-md-3">
      <div class="card stat-card h-100 p-3 d-flex flex-row align-items-center gap-3">
        <div class="stat-icon text-primary"><i class="bi bi-cup-hot-fill"></i></div>
        <div>
          <div class="stat-val" id="sc-count">—</div>
          <div class="stat-lbl">今日喂奶次数</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card h-100 p-3 d-flex flex-row align-items-center gap-3">
        <div class="stat-icon text-success"><i class="bi bi-droplet-fill"></i></div>
        <div>
          <div class="stat-val" id="sc-ml">—</div>
          <div class="stat-lbl">今日总量 (ml)</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card h-100 p-3 d-flex flex-row align-items-center gap-3">
        <div class="stat-icon text-warning"><i class="bi bi-cpu-fill"></i></div>
        <div>
          <div class="stat-val" id="sc-devices">—</div>
          <div class="stat-lbl">设备在线</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card h-100 p-3 d-flex flex-row align-items-center gap-3">
        <div class="stat-icon text-danger"><i class="bi bi-clock-history"></i></div>
        <div>
          <div class="stat-val" id="sc-last" style="font-size:1.2rem;">—</div>
          <div class="stat-lbl">最后喂奶时间</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Devices + Chart ── -->
  <div class="row g-3 mb-3">

    <!-- Device status -->
    <div class="col-lg-4">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-hdd-network me-1"></i>设备状态</span>
          <span class="badge bg-secondary" id="device-count-badge">0 台</span>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0" id="device-table">
            <thead class="table-light">
              <tr>
                <th class="ps-3">设备</th>
                <th>状态</th>
                <th>今日</th>
                <th>最后记录</th>
              </tr>
            </thead>
            <tbody id="device-tbody">
              <tr><td colspan="4" class="text-center text-muted py-3">加载中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 7-day chart -->
    <div class="col-lg-8">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-bar-chart-fill me-1"></i><span id="chart-title">近 7 日</span>喂奶趋势</span>
          <div class="btn-group btn-group-sm" role="group">
            <button type="button" class="btn btn-outline-secondary active" id="chart-btn-7"  onclick="switchDays(7)">7天</button>
            <button type="button" class="btn btn-outline-secondary"        id="chart-btn-14" onclick="switchDays(14)">14天</button>
            <button type="button" class="btn btn-outline-secondary"        id="chart-btn-30" onclick="switchDays(30)">30天</button>
          </div>
        </div>
        <div class="card-body" style="position:relative;min-height:220px;">
          <canvas id="daily-chart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Recent records ── -->
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <span><i class="bi bi-list-ul me-1"></i>喂养记录</span>
        <!-- Tab 切换按钮组 -->
        <div class="btn-group btn-group-sm" role="group">
          <button class="btn btn-outline-secondary active" id="tab-all" onclick="switchRecordType(null)">全部</button>
          <button class="btn btn-outline-secondary" id="tab-milk" onclick="switchRecordType('milk')">🍼 喂奶</button>
          <button class="btn btn-outline-secondary" id="tab-solid" onclick="switchRecordType('solid')">🥣 辅食</button>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="text-muted" style="font-size:.82rem;" id="record-count-label"></span>
        <button class="btn btn-sm btn-outline-secondary" onclick="toggleFilters()">
          <i class="bi bi-funnel"></i> 筛选
        </button>
        <button class="btn btn-sm btn-outline-success" onclick="exportCSV()">
          <i class="bi bi-download"></i> 导出
        </button>
        <button class="btn btn-sm btn-primary" onclick="openAddModal()">
          <i class="bi bi-plus-lg me-1"></i>添加
        </button>
      </div>
    </div>
    
    <!-- 筛选面板 -->
    <div id="filter-panel" class="card-body border-bottom bg-light" style="display:none;">
      <div class="row g-2">
        <div class="col-md-3">
          <label class="form-label form-label-sm">开始日期</label>
          <input type="date" class="form-control form-control-sm" id="filter-start-date" />
        </div>
        <div class="col-md-3">
          <label class="form-label form-label-sm">结束日期</label>
          <input type="date" class="form-control form-control-sm" id="filter-end-date" />
        </div>
        <div class="col-md-3">
          <label class="form-label form-label-sm">设备ID</label>
          <input type="text" class="form-control form-control-sm" id="filter-device" placeholder="全部设备" />
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <button class="btn btn-sm btn-primary me-2" onclick="applyFilters()">应用</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="resetFilters()">重置</button>
        </div>
      </div>
    </div>
    
    <div class="card-body p-0" style="overflow-x:auto;">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">#</th>
            <th>时间</th>
            <th>设备</th>
            <th>类型</th>
            <th>数量</th>
            <th>时段</th>
            <th style="width:100px;">操作</th>
          </tr>
        </thead>
        <tbody id="records-tbody">
          <tr><td colspan="7" class="text-center text-muted py-3">加载中…</td></tr>
        </tbody>
      </table>
    </div>
    
    <!-- 分页 -->
    <div class="card-footer d-flex justify-content-between align-items-center">
      <div class="text-muted" style="font-size:.875rem;" id="pagination-info">共 0 条</div>
      <nav id="pagination-nav" style="display:none;">
        <ul class="pagination pagination-sm mb-0" id="pagination-list"></ul>
      </nav>
    </div>
  </div>

</div><!-- /container -->

<!-- ── Record Modal ── -->
<div class="modal fade" id="recordModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="recordModalTitle">添加喂养记录</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="recordForm">
          <input type="hidden" id="rf-id" />
          <div class="mb-3">
            <label for="rf-device" class="form-label">设备 ID</label>
            <input type="text" class="form-control" id="rf-device" required placeholder="如 m5-dualkey-01" />
          </div>
          <div class="mb-3">
            <label for="rf-type" class="form-label">类型</label>
            <select class="form-select" id="rf-type" required>
              <option value="milk">🍼 喂奶</option>
              <option value="solid">🥣 辅食</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="rf-amount" class="form-label">数量</label>
            <div class="input-group">
              <input type="number" class="form-control" id="rf-amount" min="0" value="180" required />
              <select class="form-select" id="rf-unit" required style="max-width:80px;">
                <option value="ml">ml</option>
                <option value="g">g</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label for="rf-period" class="form-label">时段</label>
            <select class="form-select" id="rf-period" required>
              <option value="day">☀️ 日间</option>
              <option value="night">🌙 夜间</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="rf-time" class="form-label">时间</label>
            <input type="datetime-local" class="form-control" id="rf-time" required />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="recordSaveBtn" onclick="saveRecord()">
          <span class="spinner-border spinner-border-sm d-none" id="save-spinner"></span>
          保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Delete Confirm Modal ── -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">确认删除</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>确定要删除记录 <strong id="delete-id"></strong> 吗？此操作不可撤销。</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-danger" onclick="confirmDelete()">删除</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- NOTE: add integrity="sha384-…" crossorigin="anonymous" attributes for production deployments -->
<script>
// ── State ────────────────────────────────────────────────────────────────────
let dailyChart = null;
let currentDays = 7;
let currentRecordType = null;  // null='全部', 'milk', 'solid'
let currentPage = 1;
let currentPageSize = 50;
let currentFilters = {
  startDate: null,
  endDate: null,
  deviceId: null,
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('zh-CN', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  });
}
function fmtTimeShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
}
function timeSince(iso) {
  if (!iso) return null;
  // 服务端返回本地时间（无时区后缀），浏览器直接解析为本地时间，不加 Z
  const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (sec < 60)   return sec + ' 秒前';
  if (sec < 3600) return Math.floor(sec / 60) + ' 分钟前';
  if (sec < 86400)return Math.floor(sec / 3600) + ' 小时前';
  return Math.floor(sec / 86400) + ' 天前';
}
function setText(id, v) { document.getElementById(id).textContent = v; }
function setHTML(id, v) { document.getElementById(id).innerHTML = v; }

// ── Error handling ───────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-banner');
  document.getElementById('error-text').textContent = msg;
  el.classList.remove('d-none');
}
function hideError() {
  document.getElementById('error-banner').classList.add('d-none');
}

// ── Base path（兼容 nginx sub-path，如 /milk/）────────────────────────────────
// 当前页面 pathname 末尾补 '/'，让相对路径正确解析
// 例：pathname=/milk/admin → BASE=/milk/admin/
const BASE = window.location.pathname.replace(/\/?$/, '/');

// ── Auth helper ─────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const url = path.startsWith('/') ? path : BASE + path;
  const fetchOpts = { credentials: 'same-origin', ...opts };
  if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
    fetchOpts.body = JSON.stringify(opts.body);
    fetchOpts.headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  }
  const r = await fetch(url, fetchOpts);
  if (r.status === 401) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:1rem"><p style="font-size:1.2rem">会话已过期，请重新登录</p><button onclick="location.reload()" style="padding:.5rem 1.5rem;font-size:1rem;cursor:pointer">重新登录</button></div>';
    throw new Error('401 Unauthorized');
  }
  return r;
}

// ── Overview ─────────────────────────────────────────────────────────────────
async function loadOverview() {
  const r = await apiFetch('api/overview');
  if (!r.ok) throw new Error(`overview: HTTP ${r.status}`);
  const data = await r.json();

  // Summary cards
  setText('sc-count', data.today_count);
  setText('sc-ml', data.today_total_ml);

  const online = data.devices.filter(d => d.online).length;
  setText('sc-devices', `${online} / ${data.devices.length}`);

  // Last feeding time from recent records
  const milkRec = (data.recent_records || []).find(r => r.record_type === 'milk');
  setText('sc-last', milkRec ? fmtTimeShort(milkRec.fed_at) : '—');

  // Device table
  renderDevices(data.devices);

  // Recent records - 使用新的分页查询
  loadRecords();
}

// ── Device table ──────────────────────────────────────────────────────────────
function renderDevices(devices) {
  setText('device-count-badge', devices.length + ' 台');
  const tbody = document.getElementById('device-tbody');
  if (!devices.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">暂无设备</td></tr>';
    return;
  }
  tbody.innerHTML = devices.map(d => {
    const dot = d.online
      ? '<span class="dot dot-on me-1" title="在线"></span>'
      : '<span class="dot dot-off me-1" title="离线"></span>';
    const badge = d.online
      ? '<span class="badge badge-online rounded-pill">在线</span>'
      : '<span class="badge badge-offline rounded-pill">离线</span>';
    const lastRec = d.last_record_at ? timeSince(d.last_record_at) : '—';
    const todayInfo = d.today_count > 0
      ? `${d.today_count}次 / ${d.today_total_ml}ml`
      : '—';
    return `<tr>
      <td class="ps-3 fw-semibold">${escHtml(d.device_id)}</td>
      <td>${dot}${badge}</td>
      <td><small>${todayInfo}</small></td>
      <td><small class="text-muted">${lastRec}</small></td>
    </tr>`;
  }).join('');
}
// ── Records loading & filtering ──────────────────────────────────────────────
async function loadRecords() {
  try {
    // 构建查询参数
    const params = new URLSearchParams({
      page: currentPage,
      page_size: currentPageSize,
    });
    
    if (currentRecordType) params.append('record_type', currentRecordType);
    if (currentFilters.startDate) params.append('start_date', currentFilters.startDate);
    if (currentFilters.endDate) params.append('end_date', currentFilters.endDate);
    if (currentFilters.deviceId) params.append('device_id', currentFilters.deviceId);
    
    const r = await apiFetch(`api/records?${params}`);
    if (!r.ok) throw new Error(`records: HTTP ${r.status}`);
    const data = await r.json();
    
    renderRecords(data.records, data.total);
    renderPagination(data.page, data.page_size, data.total);
  } catch (err) {
    showError('加载记录失败：' + err.message);
  }
}

function switchRecordType(type) {
  currentRecordType = type;
  currentPage = 1; // 重置到第一页
  
  // 更新按钮状态
  ['all', 'milk', 'solid'].forEach(t => {
    const btn = document.getElementById(`tab-${t}`);
    if (btn) {
      btn.classList.toggle('active', 
        (t === 'all' && type === null) || type === t
      );
    }
  });
  
  loadRecords();
}

function toggleFilters() {
  const panel = document.getElementById('filter-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function applyFilters() {
  currentFilters.startDate = document.getElementById('filter-start-date').value || null;
  currentFilters.endDate = document.getElementById('filter-end-date').value || null;
  currentFilters.deviceId = document.getElementById('filter-device').value.trim() || null;
  currentPage = 1; // 重置到第一页
  loadRecords();
}

function resetFilters() {
  document.getElementById('filter-start-date').value = '';
  document.getElementById('filter-end-date').value = '';
  document.getElementById('filter-device').value = '';
  currentFilters = { startDate: null, endDate: null, deviceId: null };
  currentPage = 1;
  loadRecords();
}

function exportCSV() {
  // 构建导出 URL（使用当前筛选条件）
  const params = new URLSearchParams();
  if (currentRecordType) params.append('record_type', currentRecordType);
  if (currentFilters.startDate) params.append('start_date', currentFilters.startDate);
  if (currentFilters.endDate) params.append('end_date', currentFilters.endDate);
  if (currentFilters.deviceId) params.append('device_id', currentFilters.deviceId);
  
  const url = `${BASE}api/records/export?${params}`;
  window.location.href = url;
}

function renderPagination(page, pageSize, total) {
  const totalPages = Math.ceil(total / pageSize);
  const info = document.getElementById('pagination-info');
  const nav = document.getElementById('pagination-nav');
  const list = document.getElementById('pagination-list');
  
  info.textContent = `共 ${total} 条`;
  
  if (totalPages <= 1) {
    nav.style.display = 'none';
    return;
  }
  
  nav.style.display = 'block';
  
  // 生成分页按钮
  let html = '';
  
  // 上一页
  html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}">
    <a class="page-link" href="#" onclick="changePage(${page - 1}); return false;">上一页</a>
  </li>`;
  
  // 页码按钮（最多显示 7 个）
  const maxButtons = 7;
  let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
  let endPage = Math.min(totalPages, startPage + maxButtons - 1);
  
  if (endPage - startPage + 1 < maxButtons) {
    startPage = Math.max(1, endPage - maxButtons + 1);
  }
  
  if (startPage > 1) {
    html += `<li class="page-item"><a class="page-link" href="#" onclick="changePage(1); return false;">1</a></li>`;
    if (startPage > 2) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
  }
  
  for (let i = startPage; i <= endPage; i++) {
    html += `<li class="page-item ${i === page ? 'active' : ''}">
      <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
    </li>`;
  }
  
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
    html += `<li class="page-item"><a class="page-link" href="#" onclick="changePage(${totalPages}); return false;">${totalPages}</a></li>`;
  }
  
  // 下一页
  html += `<li class="page-item ${page >= totalPages ? 'disabled' : ''}">
    <a class="page-link" href="#" onclick="changePage(${page + 1}); return false;">下一页</a>
  </li>`;
  
  list.innerHTML = html;
}

function changePage(page) {
  if (page < 1) return;
  currentPage = page;
  loadRecords();
  // 滚动到记录表格顶部
  document.querySelector('.card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
// ── Records table ─────────────────────────────────────────────────────────────
let _cachedRecords = [];
let _totalRecords = 0;

function renderRecords(records, total = null) {
  _cachedRecords = records;
  if (total !== null) _totalRecords = total;
  
  // 应用类型筛选（Tab）
  const filtered = currentRecordType 
    ? records.filter(r => r.record_type === currentRecordType)
    : records;
  
  document.getElementById('record-count-label').textContent = `共 ${total || records.length} 条`;
  
  const tbody = document.getElementById('records-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-3">暂无记录</td></tr>';
    return;
  }
  
  tbody.innerHTML = filtered.map((r, i) => {
    const typeHtml = r.record_type === 'milk'
      ? '<span class="type-milk"><i class="bi bi-cup-hot-fill"></i> 喂奶</span>'
      : '<span class="type-solid"><i class="bi bi-bowl-hot-fill"></i> 辅食</span>';
    const period = r.period === 'night' ? '🌙 夜间' : '☀️ 日间';
    
    // 根据 unit 字段显示数量和单位
    let amountHtml;
    if (r.amount_value > 0) {
      amountHtml = `<strong>${r.amount_value}</strong> ${r.unit}`;
    } else {
      amountHtml = '<span class="text-muted">—</span>';
    }
    
    const rowClass = r.period === 'night' ? 'table-light' : '';
    const originalIndex = records.indexOf(r); // 获取原始索引用于编辑
    return `<tr class="${rowClass}">
      <td class="ps-3 text-muted">${r.id}</td>
      <td>${fmtTime(r.fed_at)}</td>
      <td><code>${escHtml(r.device_id)}</code></td>
      <td>${typeHtml}</td>
      <td>${amountHtml}</td>
      <td><small>${period}</small></td>
      <td>
        <button class="btn btn-sm btn-outline-primary py-0 px-1 me-1" title="编辑" onclick="openEditModal(${originalIndex})">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger py-0 px-1" title="删除" onclick="openDeleteModal(${r.id})">
          <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>`;
  }).join('');
}

// ── Tab switches & filters ────────────────────────────────────────────────────
function switchRecordType(type) {
  currentRecordType = type;
  currentPage = 1; // 重置页码
  
  // 更新按钮状态
  ['tab-all', 'tab-milk', 'tab-solid'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  const activeTabId = type === 'milk' ? 'tab-milk' : type === 'solid' ? 'tab-solid' : 'tab-all';
  document.getElementById(activeTabId).classList.add('active');
  
  // 重新加载记录
  loadRecords();
}

function toggleFilters() {
  const panel = document.getElementById('filter-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function applyFilters() {
  currentFilters.startDate = document.getElementById('filter-start-date').value || null;
  currentFilters.endDate = document.getElementById('filter-end-date').value || null;
  currentFilters.deviceId = document.getElementById('filter-device').value || null;
  currentPage = 1; // 重置页码
  loadRecords();
}

function resetFilters() {
  document.getElementById('filter-start-date').value = '';
  document.getElementById('filter-end-date').value = '';
  document.getElementById('filter-device').value = '';
  currentFilters = { startDate: null, endDate: null, deviceId: null };
  currentPage = 1;
  loadRecords();
}

async function loadRecords() {
  try {
    const params = new URLSearchParams({
      page: currentPage,
      page_size: currentPageSize,
    });
    
    if (currentRecordType) params.append('record_type', currentRecordType);
    if (currentFilters.startDate) params.append('start_date', currentFilters.startDate);
    if (currentFilters.endDate) params.append('end_date', currentFilters.endDate);
    if (currentFilters.deviceId) params.append('device_id', currentFilters.deviceId);
    
    const r = await apiFetch(`api/records?${params}`);
    if (!r.ok) throw new Error(`load records: HTTP ${r.status}`);
    const data = await r.json();
    
    renderRecords(data.records, data.total);
    renderPagination(data.total, data.page, data.page_size);
  } catch (err) {
    showError(err.message);
  }
}

function renderPagination(total, page, pageSize) {
  const totalPages = Math.ceil(total / pageSize);
  document.getElementById('pagination-info').textContent = `共 ${total} 条`;
  
  if (totalPages <= 1) {
    document.getElementById('pagination-nav').style.display = 'none';
    return;
  }
  
  document.getElementById('pagination-nav').style.display = 'block';
  const paginationList = document.getElementById('pagination-list');
  
  let html = '';
  
  // 上一页
  html += `<li class="page-item ${page === 1 ? 'disabled' : ''}">
    <a class="page-link" href="#" onclick="changePage(${page - 1}); return false;">&laquo;</a>
  </li>`;
  
  // 页码
  const maxVisible = 5;
  let startPage = Math.max(1, page - Math.floor(maxVisible / 2));
  let endPage = Math.min(totalPages, startPage + maxVisible - 1);
  
  if (endPage - startPage < maxVisible - 1) {
    startPage = Math.max(1, endPage - maxVisible + 1);
  }
  
  if (startPage > 1) {
    html += `<li class="page-item"><a class="page-link" href="#" onclick="changePage(1); return false;">1</a></li>`;
    if (startPage > 2) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
  }
  
  for (let i = startPage; i <= endPage; i++) {
    html += `<li class="page-item ${i === page ? 'active' : ''}">
      <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
    </li>`;
  }
  
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
    html += `<li class="page-item"><a class="page-link" href="#" onclick="changePage(${totalPages}); return false;">${totalPages}</a></li>`;
  }
  
  // 下一页
  html += `<li class="page-item ${page === totalPages ? 'disabled' : ''}">
    <a class="page-link" href="#" onclick="changePage(${page + 1}); return false;">&raquo;</a>
  </li>`;
  
  paginationList.innerHTML = html;
}

function changePage(page) {
  currentPage = page;
  loadRecords();
}

function exportCSV() {
  const params = new URLSearchParams();
  if (currentRecordType) params.append('record_type', currentRecordType);
  if (currentFilters.startDate) params.append('start_date', currentFilters.startDate);
  if (currentFilters.endDate) params.append('end_date', currentFilters.endDate);
  if (currentFilters.deviceId) params.append('device_id', currentFilters.deviceId);
  
  window.location.href = `${BASE}api/records/export?${params}`;
}

// ── Daily chart ───────────────────────────────────────────────────────────────
async function loadDailyStats(days) {
  const r = await apiFetch(`api/stats/daily?days=${days}`);
  if (!r.ok) throw new Error(`daily stats: HTTP ${r.status}`);
  const data = await r.json();
  renderChart(data);
}

function renderChart(data) {
  const labels = data.map(d => d.date.slice(5));   // MM-DD
  const counts  = data.map(d => d.count);
  const totals  = data.map(d => d.total_ml);

  const ctx = document.getElementById('daily-chart').getContext('2d');
  if (dailyChart) dailyChart.destroy();

  dailyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '次数',
          data: counts,
          backgroundColor: 'rgba(13,110,253,.75)',
          borderRadius: 5,
          yAxisID: 'yCount',
          order: 2,
        },
        {
          label: '总量 (ml)',
          data: totals,
          type: 'line',
          borderColor: '#198754',
          backgroundColor: 'rgba(25,135,84,.12)',
          tension: .35,
          pointRadius: 4,
          fill: true,
          yAxisID: 'yMl',
          order: 1,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 10 } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label === '总量 (ml)'
              ? ` ${ctx.raw} ml`
              : ` ${ctx.raw} 次`,
          },
        },
      },
      scales: {
        yCount: {
          type: 'linear', position: 'left',
          beginAtZero: true, ticks: { stepSize: 1 },
          title: { display: true, text: '次数', color: '#0d6efd' },
          grid: { color: 'rgba(0,0,0,.04)' },
        },
        yMl: {
          type: 'linear', position: 'right',
          beginAtZero: true,
          title: { display: true, text: 'ml', color: '#198754' },
          grid: { drawOnChartArea: false },
        },
      },
    },
  });
}

// ── Day-range switcher ───────────────────────────────────────────────────────
function switchDays(days) {
  currentDays = days;
  [7, 14, 30].forEach(d => {
    document.getElementById(`chart-btn-${d}`).classList.toggle('active', d === days);
  });
  setText('chart-title', `近 ${days} 日`);
  loadDailyStats(days).catch(err => showError(err.message));
}

// ── XSS helper ───────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Record CRUD ──────────────────────────────────────────────────────────────
let _editingId = null;
let _deleteId  = null;
let _recordModal = null;
let _deleteModal = null;

function getRecordModal()  { return _recordModal || (_recordModal = new bootstrap.Modal(document.getElementById('recordModal'))); }
function getDeleteModal()  { return _deleteModal || (_deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'))); }

function _nowLocal() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

function openAddModal() {
  _editingId = null;
  document.getElementById('recordModalTitle').textContent = '添加喂养记录';
  document.getElementById('rf-id').value = '';
  document.getElementById('rf-device').value = '';
  document.getElementById('rf-device').disabled = false;
  document.getElementById('rf-type').value = 'milk';
  document.getElementById('rf-amount').value = 180;
  document.getElementById('rf-unit').value = 'ml';
  document.getElementById('rf-period').value = 'day';
  document.getElementById('rf-time').value = _nowLocal();
  getRecordModal().show();
}

function openEditModal(idx) {
  const r = _cachedRecords[idx];
  if (!r) return;
  _editingId = r.id;
  document.getElementById('recordModalTitle').textContent = '编辑喂养记录 #' + r.id;
  document.getElementById('rf-id').value = r.id;
  document.getElementById('rf-device').value = r.device_id;
  document.getElementById('rf-device').disabled = true;  // 不允许改设备
  document.getElementById('rf-type').value = r.record_type;
  document.getElementById('rf-amount').value = r.amount_value;
  document.getElementById('rf-unit').value = r.unit;
  document.getElementById('rf-period').value = r.period;
  // fed_at from server is local naive time
  const dt = new Date(r.fed_at);
  dt.setMinutes(dt.getMinutes() - dt.getTimezoneOffset());
  document.getElementById('rf-time').value = dt.toISOString().slice(0, 16);
  getRecordModal().show();
}

async function saveRecord() {
  const form = document.getElementById('recordForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }

  const spinner = document.getElementById('save-spinner');
  const btn = document.getElementById('recordSaveBtn');
  spinner.classList.remove('d-none');
  btn.disabled = true;

  try {
    const body = {
      device_id: document.getElementById('rf-device').value.trim(),
      record_type: document.getElementById('rf-type').value,
      amount_value: parseInt(document.getElementById('rf-amount').value),
      unit: document.getElementById('rf-unit').value,
      period: document.getElementById('rf-period').value,
      fed_at: document.getElementById('rf-time').value + ':00',
    };

    let r;
    if (_editingId) {
      r = await apiFetch(`api/records/${_editingId}`, { method: 'PUT', body });
    } else {
      r = await apiFetch('api/records/create', { method: 'POST', body });
    }

    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${r.status}`);
    }

    getRecordModal().hide();
    await loadAll();
  } catch (err) {
    showError('保存失败：' + err.message);
  } finally {
    spinner.classList.add('d-none');
    btn.disabled = false;
  }
}

function openDeleteModal(id) {
  _deleteId = id;
  document.getElementById('delete-id').textContent = '#' + id;
  getDeleteModal().show();
}

async function confirmDelete() {
  if (!_deleteId) return;
  try {
    const r = await apiFetch(`api/records/${_deleteId}`, { method: 'DELETE' });
    if (!r.ok && r.status !== 204) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${r.status}`);
    }
    getDeleteModal().hide();
    await loadAll();
  } catch (err) {
    showError('删除失败：' + err.message);
  }
}

// 类型切换时自动调整数量和单位
document.getElementById('rf-type').addEventListener('change', function() {
  const amountEl = document.getElementById('rf-amount');
  const unitEl = document.getElementById('rf-unit');
  
  if (this.value === 'solid') {
    // 切换到辅食：设为 0g
    amountEl.value = 0;
    unitEl.value = 'g';
  } else {
    // 切换到喂奶：恢复默认值 180ml
    if (amountEl.value === '0') {
      amountEl.value = 180;
    }
    unitEl.value = 'ml';
  }
});

// ── Main load ────────────────────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('spinner').style.display = 'inline-block';
  hideError();
  try {
    await Promise.all([
      loadOverview(),
      loadDailyStats(currentDays),
    ]);
    setText('last-updated', '更新：' + new Date().toLocaleTimeString('zh-CN'));
  } catch (err) {
    showError('数据加载失败：' + err.message);
  } finally {
    document.getElementById('spinner').style.display = 'none';
  }
}

// Initial load + auto-refresh every 30 s
loadAll();
setInterval(loadAll, 30000);
</script>
